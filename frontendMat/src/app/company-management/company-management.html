<div class="title">
    <h1>Registered Companies</h1>
    <p>Manage corporate entities</p>
</div>


<button matFab extended class="fab" (click)="openAddCompanyDialog()">
    <mat-icon>add</mat-icon>
    Add new
</button>


@for (company of companies(); track $index) {
<mat-card appearance="outlined" class="card">
    <mat-card-header class="cardContent">
        <mat-card-title class="cardTitle">
            <mat-icon class="companyIcon">apartment</mat-icon>
            <mat-card-title-group>
                <mat-card-title-group>
                    
                    <mat-card-title>{{ company.name }}</mat-card-title>
                    <mat-card-subtitle>Number of employees: </mat-card-subtitle>
                </mat-card-title-group>

            </mat-card-title-group>
        </mat-card-title>
    </mat-card-header>
    <mat-card-actions align="end">
        <button matButton class="update" (click)="openEditCompanyDialog(company.id)">
            Update<mat-icon>update</mat-icon>
        </button>
        <button matButton class="delete" (click)="openDeleteCompanyDialog(company.id)">
            Delete<mat-icon>delete</mat-icon>
        </button>
    </mat-card-actions>
</mat-card>
}
<div style="height: 100px;"></div>
