<h2 mat-dialog-title>Edit Company</h2>
<mat-dialog-content>
    <form (submit)="updateOnSubmit($event)">
        <p>
            <mat-form-field appearance="fill" type="name">
                <mat-label>Company name</mat-label>
                <input matInput placeholder="Ex: Cyraco" [formField]="updateForm.name">
                <mat-icon matSuffix>apartment</mat-icon>
            </mat-form-field>
        </p>
        <div class="buttons">
            <button type="submit" matButton id="save">Save</button>
            <button matButton type="button" id="close" (click)="closeDialog()">Close</button>
        </div>
    </form>
</mat-dialog-content>
